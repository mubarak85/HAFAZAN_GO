<!DOCTYPE html>
<html lang="ms">

        :root {
            --primary: #0284c7;

            --secondary: #0f172a;
            --success: #10b981;
            --bg: #f1f5f9;

            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--secondary);
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 16px;
        }

        .box {
            background: #ffffff;
            padding: 28px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);

        .app-logo {
            font-size: 40px;
            text-align: center;
            margin-bottom: 10px;
        }

        h2 {
            text-align: center;
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: 700;
        }

        p {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 15px;
            background-color: #f8fafc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background-color: var(--primary-dark); }
        .d-none { display: none !important; }

        .header-user {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .welcome-text { font-size: 13px; color: var(--text-muted); }

            background-color: #fef3c7;
            color: #d97706;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 14px;
        }

            border: 0;
            height: 1px;
            background: #e2e8f0;
            margin: 20px 0;
        }

        .col { flex: 1; }
        .col label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-muted);

        function autoTukarJuzukSurah() {
            const msInput = document.getElementById("pilih-ms").value;
            const hasil = dapatkanJuzukDanSurah(msInput);

            if (hasil) {
                document.getElementById("pilih-juzuk").value = hasil.juzuk;
                document.getElementById("pilih-surah").value = hasil.surah;
            }
        }

        // ---------------------------------------------------------------
        // PROSES LOG MASUK (HUBUNGI APPS SCRIPT)
        // ---------------------------------------------------------------
        async function logMasuk() {
            const idInput = document.getElementById("username").value.trim();
            const passwordInput = document.getElementById("password").value.trim();
            const errorTeks = document.getElementById("login-error");
            const btnLogin = document.getElementById("btn-login");

            if (!idInput || !passwordInput) {
                errorTeks.textContent = "Sila isi ID dan Kata Laluan!";
                return;
            }

            btnLogin.textContent = "Menghubung pelayan...";
            btnLogin.disabled = true;
            errorTeks.textContent = "";

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "login",
                        id: idInput,
                        password: passwordInput
                    })
                });
                
                const data = await response.json();
                
                if (data.result === "success") {
                    pelajarSemasa = {
                        id: idInput,
                        nama: data.nama,
                        mata: parseInt(data.mata) || 0
                    };

                    document.getElementById("login-box").classList.add("d-none");
                    document.getElementById("dashboard-box").classList.remove("d-none");
                    
                    document.getElementById("nama-pelajar").textContent = pelajarSemasa.nama;
                    document.getElementById("mata-pelajar").textContent = pelajarSemasa.mata;
                    
                    // Set default ke Muka Surat 1 sewaktu mula masuk
                    document.getElementById("pilih-ms").value = "1";
                    autoTukarJuzukSurah();
                    
                    kemaskiniTeksStatus("Juzuk 1", "1. Al-Fatihah", "1", "Mula Sesi");
                } else {
                    errorTeks.textContent = data.message;
                }
            } catch (error) {
                console.error("Ralat sambungan:", error);
                errorTeks.textContent = "Gagal masuk. Sila semak sambungan internet/URL API.";
            } finally {
                btnLogin.textContent = "Masuk Permainan";
                btnLogin.disabled = false;
            }
        }

        function kemaskiniTeksStatus(juzuk, surah, ms, fasa) {
            document.getElementById("status-terakhir").textContent = 
                `${juzuk} | ${surah} | Muka Surat ${ms} (${fasa})`;
        }

        // ---------------------------------------------------------------
        // PROSES SIMPAN REKOD HAFAZAN (APPEND LOG)
        // ---------------------------------------------------------------
        function selesaiFasa(fasaNama, mataGanjaran) {
            if (!pelajarSemasa) return;
            
            const jDipilih = document.getElementById("pilih-juzuk").value;
            const sDipilih = document.getElementById("pilih-surah").value;
            const mDipilih = document.getElementById("pilih-ms").value;
            
            alert(`Alhamdulillah! +${mataGanjaran} Mata berjaya dihantar ke log.`);

            fetch(API_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    action: "log",
                    id: pelajarSemasa.id, 
                    mata: mataGanjaran, 
                    juzuk: jDipilih, 
                    surah: sDipilih, 
                    mukaSurat: mDipilih, 
                    fasa: fasaNama 
                })
            })
            .then(() => {
                pelajarSemasa.mata += mataGanjaran;
                document.getElementById("mata-pelajar").textContent = pelajarSemasa.mata;
                kemaskiniTeksStatus(jDipilih, sDipilih, mDipilih, fasaNama);
            })
            .catch(err => console.error("Ralat menyimpan rekod:", err));
        }

        function logKeluar() {
            pelajarSemasa = null;
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            document.getElementById("login-box").classList.remove("d-none");
            document.getElementById("dashboard-box").classList.add("d-none");
        }
    </script>
</body>
</html>
